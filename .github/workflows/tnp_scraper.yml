name: TnP Job Monitor

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

# CRITICAL: This allows the bot to push jobs.json back to the repository
permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        
    - name: Run Scraper
      env:
        PORTAL_USERNAME: ${{ secrets.PORTAL_USERNAME }}
        PORTAL_PASSWORD: ${{ secrets.PORTAL_PASSWORD }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python scraper.py
      
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add jobs.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update jobs.json with new postings" && git push)